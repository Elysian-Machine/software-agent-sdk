name: Identify LLM API Key (Incident Response)

on:
  workflow_dispatch:

jobs:
  identify-key:
    runs-on: ubuntu-latest
    steps:
      - name: Print first 10 characters of LLM_API_KEY_EVAL
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY_EVAL }}
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "LLM_API_KEY_EVAL secret is empty or not set"
            exit 1
          fi
          PREFIX=$(echo "$LLM_API_KEY" | cut -c1-10)
          echo "First 10 characters of LLM_API_KEY_EVAL: ${PREFIX}"
