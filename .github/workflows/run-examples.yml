---
name: Run Examples Scripts

on:
    pull_request:
        types: [labeled]
    workflow_dispatch:
        inputs:
            reason:
                description: Reason for manual trigger
                required: true
                default: ''
    schedule:
        - cron: 30 22 * * * # Runs at 10:30pm UTC every day

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    identify-key:
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Print first 10 characters of LLM_API_KEY_EVAL
              env:
                  LLM_API_KEY: ${{ secrets.LLM_API_KEY_EVAL }}
              run: |
                  if [ -z "$LLM_API_KEY" ]; then
                    echo "LLM_API_KEY_EVAL secret is empty or not set"
                    exit 1
                  fi
                  PREFIX=$(echo "$LLM_API_KEY" | cut -c1-20)
                  echo "First 10 characters of LLM_API_KEY_EVAL: ${PREFIX}"
